openapi: 3.1.0
info:
  title: Multitenant Inventory and POS App API
  version: 0.1.0
  description: |
    Initial application contract for tenant bootstrap, outlet management, catalog operations,
    POS transactions, and notification registration.
servers:
  - url: https://app.example.com
    description: Production
  - url: http://localhost:3000
    description: Local development
tags:
  - name: Session
  - name: Outlets
  - name: Catalog
  - name: POS
  - name: Notifications
paths:
  /api/session/bootstrap:
    get:
      tags: [Session]
      summary: Load active user, memberships, preferences, and active tenant context
      responses:
        "200":
          description: Session bootstrap payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BootstrapResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/session/active-tenant:
    post:
      tags: [Session]
      summary: Switch the active tenant for the current authenticated session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenantId]
              properties:
                tenantId:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Active tenant updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantContext"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/outlets:
    get:
      tags: [Outlets]
      summary: List outlets for the active tenant
      parameters:
        - in: query
          name: includeMapData
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Outlet list
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Outlet"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Outlets]
      summary: Create an outlet for the active tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OutletInput"
      responses:
        "201":
          description: Outlet created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Outlet"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/catalog/items:
    get:
      tags: [Catalog]
      summary: List catalog items for the active tenant
      responses:
        "200":
          description: Catalog item list
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/CatalogItem"
    post:
      tags: [Catalog]
      summary: Create a catalog item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatalogItemInput"
      responses:
        "201":
          description: Catalog item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogItem"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/pos/orders:
    post:
      tags: [POS]
      summary: Create a POS order draft or immediate order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PosOrderInput"
      responses:
        "201":
          description: POS order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PosOrder"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/pos/orders/{orderId}/complete:
    post:
      tags: [POS]
      summary: Complete an open POS order and apply stock movements
      parameters:
        - in: path
          name: orderId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: POS order completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PosOrder"
        "409":
          description: Order cannot be completed due to state or stock conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/notifications/subscriptions:
    post:
      tags: [Notifications]
      summary: Register or update the current user's browser notification subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationSubscriptionInput"
      responses:
        "200":
          description: Subscription registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationSubscription"
  /api/notifications/test:
    post:
      tags: [Notifications]
      summary: Send a tenant-scoped test notification to eligible subscriptions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, body]
              properties:
                title:
                  type: string
                body:
                  type: string
      responses:
        "202":
          description: Notification event accepted for send
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationEvent"
        "403":
          $ref: "#/components/responses/Forbidden"
components:
  responses:
    Unauthorized:
      description: Authentication is required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: The caller lacks permission for this action
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationErrorResponse"
  schemas:
    BootstrapResponse:
      type: object
      required: [user, memberships, preferences, activeTenant]
      properties:
        user:
          $ref: "#/components/schemas/UserSummary"
        memberships:
          type: array
          items:
            $ref: "#/components/schemas/TenantMembership"
        preferences:
          $ref: "#/components/schemas/PreferenceProfile"
        activeTenant:
          $ref: "#/components/schemas/TenantContext"
    TenantContext:
      type: object
      required: [tenantId, tenantName, role]
      properties:
        tenantId:
          type: string
          format: uuid
        tenantName:
          type: string
        role:
          type: string
        outletId:
          type: string
          format: uuid
          nullable: true
    UserSummary:
      type: object
      required: [id, email]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
          nullable: true
    TenantMembership:
      type: object
      required: [tenantId, tenantName, role, status]
      properties:
        tenantId:
          type: string
          format: uuid
        tenantName:
          type: string
        role:
          type: string
        status:
          type: string
    PreferenceProfile:
      type: object
      properties:
        locale:
          type: string
        themeMode:
          type: string
          enum: [light, dark, system]
        defaultTenantId:
          type: string
          format: uuid
          nullable: true
        defaultOutletId:
          type: string
          format: uuid
          nullable: true
    Outlet:
      type: object
      required: [id, name, status, city, countryCode]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        city:
          type: string
        stateProvince:
          type: string
          nullable: true
        countryCode:
          type: string
        latitude:
          type: number
          nullable: true
        longitude:
          type: number
          nullable: true
        status:
          type: string
    OutletInput:
      type: object
      required: [code, name, addressLine1, city, countryCode, timezone]
      properties:
        code:
          type: string
        name:
          type: string
        phone:
          type: string
        addressLine1:
          type: string
        addressLine2:
          type: string
        city:
          type: string
        stateProvince:
          type: string
        postalCode:
          type: string
        countryCode:
          type: string
        timezone:
          type: string
        latitude:
          type: number
        longitude:
          type: number
    CatalogItem:
      type: object
      required: [id, sku, name, itemType, salePrice, status]
      properties:
        id:
          type: string
          format: uuid
        sku:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        itemType:
          type: string
          enum: [inventory, menu, hybrid]
        salePrice:
          type: number
        costPrice:
          type: number
          nullable: true
        status:
          type: string
    CatalogItemInput:
      type: object
      required: [sku, name, itemType, unitOfMeasure, salePrice]
      properties:
        sku:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
        itemType:
          type: string
          enum: [inventory, menu, hybrid]
        unitOfMeasure:
          type: string
        salePrice:
          type: number
        costPrice:
          type: number
        taxMode:
          type: string
    PosOrder:
      type: object
      required: [id, outletId, status, totalAmount, lineItems]
      properties:
        id:
          type: string
          format: uuid
        outletId:
          type: string
          format: uuid
        status:
          type: string
          enum: [draft, open, completed, cancelled, refunded]
        subtotalAmount:
          type: number
        taxAmount:
          type: number
        discountAmount:
          type: number
        totalAmount:
          type: number
        lineItems:
          type: array
          items:
            $ref: "#/components/schemas/PosOrderLineInput"
    PosOrderInput:
      type: object
      required: [outletId, orderType, lineItems]
      properties:
        outletId:
          type: string
          format: uuid
        orderType:
          type: string
          enum: [counter, dine_in, takeaway, delivery]
        notes:
          type: string
        lineItems:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/PosOrderLineInput"
    PosOrderLineInput:
      type: object
      required: [catalogItemId, quantity]
      properties:
        catalogItemId:
          type: string
          format: uuid
        quantity:
          type: number
        notes:
          type: string
    NotificationSubscription:
      type: object
      required: [id, provider, permissionState, isActive]
      properties:
        id:
          type: string
          format: uuid
        provider:
          type: string
        permissionState:
          type: string
        isActive:
          type: boolean
    NotificationSubscriptionInput:
      type: object
      required: [provider, externalSubscriptionId, permissionState]
      properties:
        provider:
          type: string
          enum: [onesignal]
        externalSubscriptionId:
          type: string
        externalUserId:
          type: string
        permissionState:
          type: string
          enum: [granted, denied, default]
        browser:
          type: string
        platform:
          type: string
    NotificationEvent:
      type: object
      required: [id, eventType, status, title, body]
      properties:
        id:
          type: string
          format: uuid
        eventType:
          type: string
        status:
          type: string
          enum: [queued, sent, delivered, failed]
        title:
          type: string
        body:
          type: string
    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
        code:
          type: string
    ValidationErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
        - type: object
          properties:
            fieldErrors:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
